  spring:
    application:
      name: api-gateway
    cloud:
      gateway:
        discovery:
          locator:
            enabled: true
        routes:
          - id: customer-service
            uri: lb://CUSTOMER-SERVICE
            predicates:
              - Path=/api/accounts/**
          - id: auth-service
            uri: lb://AUTH-SERVICE
            predicates:
              - Path=/api/users/**
          - id: payment-service
            uri: lb://PAYMENT-SERVICE
            predicates:
              - Path=/api/payments/**
          - id: transaction-service
            uri: lb://TRANSACTION-SERVICE
            predicates:
              - Path=/api/transactions/**
          - id: notification-service
            uri: lb://NOTIFICATION-SERVICE
            predicates:
              - Path=/api/notifications/**
          - id: saga-orchestrator-service
            uri: lb://SAGA-ORCHESTRATOR-SERVICE
            predicates:
              - Path=/api/saga/**
    security:
      oauth2:
        resourceserver:
          jwt:
            jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8089/realms/baas/protocol/openid-connect/certs}
  jwt:
    secret: "bW9yZVNlY3VyZVNlY3JldEtleUhhc2g0MjM0NTY="
    expiration: "1200"
  server:
    port: 8081
  eureka:
    client:
      register-with-eureka: true
      fetch-registry: true
      service-url:
        defaultZone: http://localhost:8761/eureka/
    instance:
      prefer-ip-address: true
      hostname: localhost
      instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  # Micrometer Tracing
  management:
    tracing:
      sampling:
        probability: 1.0
      propagation:
        type: W3C   # phải khớp với Gateway
    otlp:
      tracing:
        endpoint: http://localhost:4318/v1/traces
  otel:
    exporter:
      otlp:
        endpoint: http://localhost:4317
        protocol: grpc
    resource:
      attributes:
        service.name: gateway-service   # ← đổi mỗi service
        service.version: "1.0.0"
        deployment.environment: local

  logging:
    level:
      io.opentelemetry: WARN
      org.springframework.cloud.gateway: DEBUG
      org.springframework.cloud.gateway.filter: DEBUG
      org.springframework.cloud.gateway.handler: DEBUG
      org.springframework.cloud.gateway.route: DEBUG
  resilience4j:
    circuitbreaker:
      configs:
        default:
          registerHealthIndicator: true
          slidingWindowSize: 10
          minimumNumberOfCalls: 5
          permittedNumberOfCallsInHalfOpenState: 3
          waitDurationInOpenState: 10s
          failureRateThreshold: 50
          eventConsumerBufferSize: 10
          ignoreExceptions:
            - org.springframework.web.server.ResponseStatusException
      instances:
        usersService:
          baseConfig: default
        accountsService:
          baseConfig: default
        transactionsService:
          baseConfig: default
        paymentsService:
          baseConfig: default
        notificationsService:
          baseConfig: default
        sagaInstancesService:
          baseConfig: default
