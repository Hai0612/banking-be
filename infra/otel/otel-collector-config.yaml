receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
  # Thêm resource attributes cho tất cả telemetry
  resource:
    attributes:
      - key: deployment.environment
        value: "local"
        action: upsert

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Logs → Elasticsearch trực tiếp (qua OTLP)
  elasticsearch:
    endpoints: ["http://elasticsearch:9200"]
    logs_index: "otel-logs-banking"
    traces_index: "otel-traces-banking"

  # Debug — in ra stdout của collector (bật khi troubleshoot)
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlp/jaeger]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [elasticsearch]