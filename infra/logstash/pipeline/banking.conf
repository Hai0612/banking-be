input {
  beats {
    port => 5044
  }
}

filter {
  # Log đã là JSON, parse thêm timestamp
  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
    timezone => "Asia/Ho_Chi_Minh"
  }

  # Extract service name từ path nếu chưa có trong log
  if ![service] {
    grok {
      match => {
        "log.file.path" =>
          "/var/log/banking/%{DATA:service}/app.log"
      }
    }
  }

  # Rename field cho đẹp
  mutate {
    rename => { "level" => "log.level" }
    # Bỏ field không cần thiết
    remove_field => [
      "agent", "ecs", "input", "tags",
      "log.file", "host.name"
    ]
  }

  # Đánh dấu log có error
  if [log.level] == "ERROR" {
    mutate { add_field => { "alert" => true } }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    # Index theo service và ngày — dễ quản lý và query
    index => "banking-%{service}-%{+YYYY.MM.dd}"
    action => "index"
  }

  # Debug — uncomment khi troubleshoot
  # stdout { codec => rubydebug }
}