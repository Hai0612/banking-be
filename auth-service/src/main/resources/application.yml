spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/user_db
    driver-class-name: org.postgresql.Driver
    username: haind
    password: haind@123

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
  cloud:
    discovery:
      enabled: true
    function:
      definition: createUserCommand;deleteUserCommand
    stream:
      bindings:
        createUserCommand-in-0:
          destination: create-user-command
          group: user-service
          content-type: application/json
        deleteUserCommand-in-0:
          destination: delete-user-command
          group: user-service
          content-type: application/json
        userCreatedEvent-out-0:
          destination: user-created-event
          content-type: application/json
        userCreationFailedEvent-out-0:
          destination: user-creation-failed-event
          content-type: application/json
        userDeletedEvent-out-0:
          destination: user-deleted-event
          content-type: application/json
        userDeletionFailedEvent-out-0:
          destination: user-deletion-failed-event
          content-type: application/json
      kafka:
        binder:
          brokers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8089/realms/baas/protocol/openid-connect/certs}
#          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8089/realms/baas}
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    hostname: localhost
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
server:
  port: 8082
security:
  internal-api-key: my-internal-key
management:
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: W3C   # phải khớp với Gateway
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
otel:
  exporter:
    otlp:
      endpoint: http://localhost:4317
      protocol: grpc
  resource:
    attributes:
      service.name: auth-service   # ← đổi mỗi service
      service.version: "1.0.0"
      deployment.environment: local

logging:
  level:
    io.opentelemetry: WARN
jwt:
  secret: "bW9yZVNlY3VyZVNlY3JldEtleUhhc2g0MjM0NTY="
  expiration: "1200000"

