version: "3.8"

networks:
  observability:
    driver: bridge

volumes:
  esdata:

services:

  # ─── OpenTelemetry Collector ───────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.97.0
    container_name: otel-collector
    ports:
      - "4317:4317"   # OTLP gRPC — service local kết nối vào đây
      - "4318:4318"   # OTLP HTTP (optional)
      - "8889:8889"   # Prometheus metrics (optional)
    volumes:
      - ./infra/otel/otel-collector-config.yaml:/etc/otel/config.yaml
    command: ["--config=/etc/otel/config.yaml"]
    networks: [observability]
    depends_on: [jaeger, elasticsearch]

  # ─── Jaeger (All-in-one) ───────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: jaeger
    ports:
      - "16686:16686"  # Jaeger UI — mở browser vào http://localhost:16686
      - "14250:14250"  # gRPC nhận từ OTel Collector
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks: [observability]

  # ─── Elasticsearch ─────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false   # dev mode, tắt auth
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks: [observability]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 10s
      retries: 5

  # ─── Kibana ────────────────────────────────────────────────
  kibana:
    image: kibana:8.13.0
    container_name: kibana
    ports:
      - "5601:5601"   # Kibana UI — http://localhost:5601
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks: [observability]
    depends_on: [elasticsearch]

  # ─── Logstash ──────────────────────────────────────────────
  logstash:
    image: logstash:8.13.0
    container_name: logstash
    ports:
      - "5044:5044"   # Beats input
    volumes:
      - ./infra/logstash/pipeline:/usr/share/logstash/pipeline
    environment:
      - LS_JAVA_OPTS=-Xmx256m -Xms256m
    networks: [observability]
    depends_on:
      elasticsearch:
        condition: service_healthy

  # ─── Filebeat ──────────────────────────────────────────────
  filebeat:
    image: elastic/filebeat:8.13.0
    container_name: filebeat
    user: root
    volumes:
      - ./infra/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      # Mount thư mục log của service local vào container
      - /Users/haind/logs/banking:/var/log/banking:ro
    networks: [observability]
    depends_on: [logstash]
    command: filebeat -e -strict.perms=false
